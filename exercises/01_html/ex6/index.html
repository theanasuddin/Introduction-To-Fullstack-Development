<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Intro2FullStack exercise">
    <meta name="author" content="Anas Uddin">
    <meta name="keywords" content="INTO2FS">
    <title>HTML Forms</title>
  </head>
  <body>
    <h1>HTML Forms</h1>
    <h2>Form A</h2>
    <form id="form-a" method="GET" action="http://localhost:3000/">
      <input type="hidden" name="hidden" value="Hello from form-a">
      <input type="text" name="text" required>
      <button type="submit">Send Form A</button>
    </form>
    <h2>Form B</h2>
    <form id="form-b" method="POST" action="http://localhost:3000/">
      <input type="hidden" name="hidden" value="Hello from form-b">
      <textarea name="message" cols="35" rows="15"></textarea>
      <button type="submit">Send Form B</button>
    </form>
  </body>
</html>
