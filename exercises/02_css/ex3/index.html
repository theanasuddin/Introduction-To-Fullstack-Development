<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML with semantic tags</title>
  </head>
  <body>
    <header>
      <nav></nav>
      <h1></h1>
    </header>
    <main>
      <article id="article1">
        <section id="sec1"></section>
        <section id="sec2"></section>
        <aside id="aside1"></aside>
      </article>
      <article id="article2">
        <section id="sec3"></section>
        <section id="sec4"></section>
        <aside id="aside2"></aside>
      </article>
    </main>
    <footer>
      <nav id="nav1"></nav>
      <nav id="nav2"></nav>
      <nav id="nav3"></nav>
    </footer>
  </body>
</html>
